id: dnd_npc_nodes
migration_group: dnd
label: 'D&D: Import simple NPC nodes (profile_type=simplified) as character nodes'
source:
  plugin: dnd_json_directory
  data_dir: /var/www/html/game_data/npcs
  profile_type_filter: simplified
process:
  title: name
  field_first_name: first_name
  field_last_name: last_name
  field_nickname: nickname
  field_pronouns: pronouns
  field_gender: gender
  field_character_type: character_type_is_pc
  field_npc_type: npc_type_is_simple
  field_role: role
  field_faction:
    plugin: entity_lookup
    source: faction
    entity_type: taxonomy_term
    bundle: factions
    value_key: name
    bundle_key: vid
    ignore_case: true
  field_species:
    plugin: entity_lookup
    source: species
    entity_type: taxonomy_term
    bundle: species
    value_key: name
    bundle_key: vid
    ignore_case: true
  field_lineage:
    plugin: entity_lookup
    source: lineage
    entity_type: taxonomy_term
    bundle: lineage
    value_key: name
    bundle_key: vid
    ignore_case: true
  field_personality: personality
  field_notes: notes
  field_recurring: recurring
  field_key_traits:
    plugin: dnd_array_entity_lookup
    source: key_traits
    entity_type: taxonomy_term
    bundle: traits
    search_key: name
  field_abilities: abilities
  field_ai_enabled: ai_enabled
  field_ai_model: ai_model
  field_ai_temperature: ai_temperature
  field_ai_max_tokens: ai_max_tokens
  field_ai_system_prompt: ai_system_prompt
  field_voice_speed: voice_speed
  field_voice_pitch: voice_pitch
  field_voice_id_ref:
    -
      plugin: skip_on_empty
      method: process
      source: voice_piper_id
    -
      plugin: entity_lookup
      entity_type: taxonomy_term
      bundle: voice_ids
      value_key: name
      bundle_key: vid
      ignore_case: true
  status:
    plugin: default_value
    default_value: 1
destination:
  plugin: 'entity:node'
  default_bundle: character
migration_dependencies:
  required: {  }
