id: dnd_npc_spell_slots
label: 'D&D: Import full NPC spell slot paragraphs'
migration_group: dnd

source:
  plugin: dnd_spell_slots_source
  data_dir: '/var/www/html/game_data/npcs'
  profile_type_filter: 'major'

process:
  type:
    plugin: default_value
    default_value: spell_slot

  field_spell_level: slot_level
  field_spell_slots_total: slot_total
  field_spell_slots_available: slot_total

destination:
  plugin: 'entity_reference_revisions:paragraph'

migration_dependencies: {}
