id: dnd_character_spell_slots
label: 'D&D: Import character spell slot paragraphs'
migration_group: dnd

# ---------------------------------------------------------------------------
# Source: one row per (character, slot_level) combination.
# Characters with no spell slots produce no rows.
# ---------------------------------------------------------------------------
source:
  plugin: dnd_spell_slots_source
  data_dir: '/var/www/html/game_data/characters'

# ---------------------------------------------------------------------------
# Process: create one paragraph:spell_slot entity per row.
# ---------------------------------------------------------------------------
process:
  type:
    plugin: default_value
    default_value: spell_slot

  # Spell level integer (1-9).
  field_spell_level: slot_level

  # Total available slots at this level.
  field_spell_slots_total: slot_total

  # Available slots start equal to total (full rest assumed at import time).
  field_spell_slots_available: slot_total

# ---------------------------------------------------------------------------
# Destination: paragraph entity of type spell_slot.
# ---------------------------------------------------------------------------
destination:
  plugin: 'entity_reference_revisions:paragraph'

migration_dependencies: {}
